services:
  postgres:
    image: postgres:15-alpine
    container_name: llm-router-postgres
    environment:
      POSTGRES_DB: llm_router
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d llm_router"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
